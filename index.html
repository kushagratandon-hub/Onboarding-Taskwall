<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Task Wall — DCF Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --border:#e4e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#6366f1;
  --accent-light:#eef2ff;
  --green:#16a34a;
  --green-light:#f0fdf4;
  --amber:#d97706;
  --amber-light:#fffbeb;
  --red:#dc2626;
  --red-light:#fef2f2;
  --blue:#0ea5e9;
  --blue-light:#f0f9ff;
  --purple:#7c3aed;
  --purple-light:#f5f3ff;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.brand-name{font-weight:700;font-size:15px}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:11px;color:var(--green);font-weight:600}
.sync-time{font-size:11px;color:var(--muted)}

/* ── LAYOUT ── */
.main{max-width:1400px;margin:0 auto;padding:20px 20px}

/* ── ADD TASK CARD ── */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.add-card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;align-items:end}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
select,input[type=text]{border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s;height:38px}
.btn-add:hover{background:#4f46e5}

/* ── ADD MEMBER ROW ── */
.member-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.member-row label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.member-input{flex:1;max-width:220px}
.btn-add-member{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0;border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-add-member:hover{background:#dcfce7}
.member-chips{display:flex;flex-wrap:wrap;gap:6px}
.member-chip{display:flex;align-items:center;gap:5px;background:var(--accent-light);border:1px solid #c7d2fe;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--accent)}
.member-chip button{background:none;border:none;cursor:pointer;color:#a5b4fc;font-size:13px;line-height:1;padding:0}
.member-chip button:hover{color:var(--red)}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-label{font-size:11px;font-weight:600;color:var(--muted);margin-right:4px}
.filter-btn{border:1px solid var(--border);background:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-select{border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text);background:#fff;outline:none;font-family:'Inter',sans-serif;cursor:pointer}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;border-top:3px solid var(--accent)}
.stat.on-track{border-top-color:var(--green)}
.stat.pending{border-top-color:var(--amber)}
.stat.overdue{border-top-color:var(--red)}
.stat-n{font-size:26px;font-weight:800;line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}

/* ── TASK WALL GRID ── */
.wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* ── TASK CARD ── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .2s}
.task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.task-card-top{padding:14px 16px 10px}
.task-type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.task-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:10px}
.task-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.assignee-badge{display:flex;align-items:center;gap:6px}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.assignee-name{font-size:12px;font-weight:500;color:var(--muted)}
.task-date{font-size:11px;color:var(--muted)}
.task-card-bottom{padding:10px 16px 14px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:8px}
.status-select{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;outline:none;flex:1;transition:all .15s}
.btn-delete{background:#fef2f2;border:1px solid #fecaca;color:var(--red);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-delete:hover{background:#fee2e2}

/* ── STATUS COLORS ── */
.status-on-track{background:var(--green-light);color:var(--green);border-color:#bbf7d0}
.status-pending{background:var(--amber-light);color:var(--amber);border-color:#fde68a}
.status-done{background:var(--blue-light);color:var(--blue);border-color:#bae6fd}
.status-blocked{background:var(--red-light);color:var(--red);border-color:#fecaca}

/* ── TASK TYPE COLORS ── */
.type-vpd{background:#ede9fe;color:#6d28d9}
.type-electricity{background:#fef9c3;color:#854d0e}
.type-udyam{background:#dcfce7;color:#166534}
.type-fi{background:#dbeafe;color:#1e40af}
.type-vendor{background:#fce7f3;color:#9d174d}
.type-other{background:#f1f5f9;color:#475569}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;font-weight:500}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:900px){.form-grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">TW</div>
    <div>
      <div class="brand-name">Task Wall</div>
      <div class="brand-sub">DCF Ops — Live Board</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span class="live-label">Live</span>
    <span class="sync-txt" id="sync-time">—</span>
  </div>
</div>

<div class="main">

  <!-- ADD TASK -->
  <div class="add-card">
    <div class="add-card-title">➕ New Task</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Task Type</label>
        <select id="task-type">
          <option value="VPD Pending">VPD Pending</option>
          <option value="Electricity Bill Pending">Electricity Bill Pending</option>
          <option value="Udyam Aadhar Update Pending">Udyam Aadhar Update Pending</option>
          <option value="Sales FI Raised">Sales FI Raised</option>
          <option value="Vendor FI Raised">Vendor FI Raised</option>
          <option value="Vendor FI Result Pending">Vendor FI Result Pending</option>
          <option value="Reraise the Vendor FI">Reraise the Vendor FI</option>
          <option value="Others">Others</option>
        </select>
      </div>
      <div class="form-group" id="custom-task-group" style="display:none">
        <label class="form-label">Custom Task</label>
        <input type="text" id="custom-task" placeholder="Describe the task...">
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select id="assignee">
          <option value="Simran">Simran</option>
          <option value="Kajal">Kajal</option>
          <option value="Gulshan">Gulshan</option>
          <option value="Zakir">Zakir</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="new-status">
          <option value="Pending">Pending</option>
          <option value="On Track">On Track</option>
          <option value="Done">Done</option>
          <option value="Blocked">Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input type="text" id="task-note" placeholder="Add a note...">
      </div>
      <button class="btn-add" onclick="addTask()">Add Task</button>
    </div>

    <!-- ADD MEMBER -->
    <div class="member-row">
      <label>Team Members:</label>
      <div class="member-chips" id="member-chips"></div>
      <input type="text" id="new-member" class="member-input" placeholder="Add new member..." onkeydown="if(event.key==='Enter')addMember()">
      <button class="btn-add-member" onclick="addMember()">+ Add</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">Total Tasks</div></div>
    <div class="stat on-track"><div class="stat-n" id="stat-ontrack">0</div><div class="stat-l">On Track</div></div>
    <div class="stat pending"><div class="stat-n" id="stat-pending">0</div><div class="stat-l">Pending</div></div>
    <div class="stat overdue"><div class="stat-n" id="stat-blocked">0</div><div class="stat-l">Blocked</div></div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('On Track',this)">✅ On Track</button>
    <button class="filter-btn" onclick="setFilter('Pending',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('Done',this)">☑️ Done</button>
    <button class="filter-btn" onclick="setFilter('Blocked',this)">🚫 Blocked</button>
    <span style="margin-left:8px" class="filter-label">Assignee:</span>
    <select class="filter-select" id="filter-assignee" onchange="renderWall()">
      <option value="">Everyone</option>
    </select>
  </div>

  <!-- TASK WALL -->
  <div class="wall" id="task-wall"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE KEYS ──
const KEY_TASKS   = 'dcf_tasks_v2';
const KEY_MEMBERS = 'dcf_members_v2';

// ── STATE ──
let tasks   = JSON.parse(localStorage.getItem(KEY_TASKS)   || '[]');
let members = JSON.parse(localStorage.getItem(KEY_MEMBERS) || '["Simran","Kajal","Gulshan","Zakir"]');
let filterStatus   = 'All';
let filterAssignee = '';

// ── AVATAR COLORS ──
const COLORS = ['#6366f1','#16a34a','#dc2626','#d97706','#0891b2','#7c3aed','#db2777','#0369a1','#15803d','#b45309'];
function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ── TASK TYPE → BADGE CLASS ──
function typeBadge(type) {
  if (type.includes('VPD'))         return 'type-vpd';
  if (type.includes('Electricity')) return 'type-electricity';
  if (type.includes('Udyam'))       return 'type-udyam';
  if (type.includes('Sales FI'))    return 'type-fi';
  if (type.includes('Vendor FI') || type.includes('Reraise')) return 'type-vendor';
  return 'type-other';
}

// ── STATUS → CSS CLASS ──
function statusClass(s) {
  if (s==='On Track') return 'status-on-track';
  if (s==='Pending')  return 'status-pending';
  if (s==='Done')     return 'status-done';
  if (s==='Blocked')  return 'status-blocked';
  return '';
}

// ── SAVE ──
function save() {
  localStorage.setItem(KEY_TASKS,   JSON.stringify(tasks));
  localStorage.setItem(KEY_MEMBERS, JSON.stringify(members));
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── ADD TASK ──
function addTask() {
  const type   = document.getElementById('task-type').value;
  const custom = document.getElementById('custom-task').value.trim();
  const label  = type === 'Others' ? (custom || 'Others') : type;
  const who    = document.getElementById('assignee').value;
  const status = document.getElementById('new-status').value;
  const note   = document.getElementById('task-note').value.trim();
  if (!who) { toast('Select an assignee'); return; }
  tasks.unshift({
    id: Date.now(),
    label, who, status, note,
    created: new Date().toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})
  });
  save();
  document.getElementById('task-note').value = '';
  document.getElementById('custom-task').value = '';
  renderWall();
  renderStats();
  toast('✅ Task added');
}

// ── DELETE TASK ──
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderWall();
  renderStats();
  toast('🗑️ Task removed');
}

// ── UPDATE STATUS ──
function updateStatus(id, status) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = status; save(); renderStats(); toast('Status updated → ' + status); }
}

// ── ADD MEMBER ──
function addMember() {
  const val = document.getElementById('new-member').value.trim();
  if (!val) return;
  if (members.includes(val)) { toast('Member already exists'); return; }
  members.push(val);
  save();
  document.getElementById('new-member').value = '';
  renderMembers();
  rebuildSelects();
  toast('👤 ' + val + ' added');
}
function removeMember(name) {
  members = members.filter(m => m !== name);
  save();
  renderMembers();
  rebuildSelects();
}

// ── RENDER MEMBERS ──
function renderMembers() {
  document.getElementById('member-chips').innerHTML = members.map(m => `
    <div class="member-chip">
      <div class="avatar" style="background:${avatarColor(m)};width:18px;height:18px;font-size:9px">${initials(m)}</div>
      ${m}
      <button onclick="removeMember('${m}')" title="Remove">×</button>
    </div>`).join('');
}

// ── REBUILD SELECTS ──
function rebuildSelects() {
  const opts = members.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('assignee').innerHTML = opts;
  const fa = document.getElementById('filter-assignee');
  const cur = fa.value;
  fa.innerHTML = '<option value="">Everyone</option>' + opts;
  if (members.includes(cur)) fa.value = cur;
}

// ── FILTER ──
function setFilter(status, btn) {
  filterStatus = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWall();
}

// ── RENDER STATS ──
function renderStats() {
  document.getElementById('stat-total').textContent   = tasks.length;
  document.getElementById('stat-ontrack').textContent = tasks.filter(t=>t.status==='On Track').length;
  document.getElementById('stat-pending').textContent = tasks.filter(t=>t.status==='Pending').length;
  document.getElementById('stat-blocked').textContent = tasks.filter(t=>t.status==='Blocked').length;
}

// ── RENDER WALL ──
function renderWall() {
  filterAssignee = document.getElementById('filter-assignee').value;
  let filtered = tasks.filter(t => {
    if (filterStatus !== 'All' && t.status !== filterStatus) return false;
    if (filterAssignee && t.who !== filterAssignee) return false;
    return true;
  });

  const wall = document.getElementById('task-wall');
  if (!filtered.length) {
    wall.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📋</div><div class="empty-text">No tasks here. Add one above.</div></div>`;
    return;
  }

  wall.innerHTML = filtered.map(t => `
    <div class="task-card">
      <div class="task-card-top">
        <span class="task-type-badge ${typeBadge(t.label)}">${t.label}</span>
        <div class="task-title">${t.label}${t.note ? `<div style="font-size:12px;font-weight:400;color:var(--muted);margin-top:4px">${t.note}</div>` : ''}</div>
        <div class="task-meta">
          <div class="assignee-badge">
            <div class="avatar" style="background:${avatarColor(t.who)}">${initials(t.who)}</div>
            <span class="assignee-name">${t.who}</span>
          </div>
          <span class="task-date">${t.created}</span>
        </div>
      </div>
      <div class="task-card-bottom">
        <select class="status-select ${statusClass(t.status)}" onchange="updateStatus(${t.id}, this.value)">
          <option value="Pending"  ${t.status==='Pending'  ?'selected':''}>⏳ Pending</option>
          <option value="On Track" ${t.status==='On Track' ?'selected':''}>✅ On Track</option>
          <option value="Done"     ${t.status==='Done'     ?'selected':''}>☑️ Done</option>
          <option value="Blocked"  ${t.status==='Blocked'  ?'selected':''}>🚫 Blocked</option>
        </select>
        <button class="btn-delete" onclick="deleteTask(${t.id})">Delete</button>
      </div>
    </div>`).join('');
}

// ── SHOW/HIDE CUSTOM TASK INPUT ──
document.getElementById('task-type').addEventListener('change', function() {
  const g = document.getElementById('custom-task-group');
  g.style.display = this.value === 'Others' ? 'flex' : 'none';
});

// ── SYNC TIME ──
function updateTime() {
  document.getElementById('sync-time').textContent =
    new Date().toLocaleTimeString('en-IN', {timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:true}) + ' IST';
}
setInterval(updateTime, 1000);
updateTime();

// ── BROADCAST CHANNEL (live sync across tabs) ──
let bc;
try {
  bc = new BroadcastChannel('dcf_taskwall');
  bc.onmessage = () => {
    tasks   = JSON.parse(localStorage.getItem(KEY_TASKS)   || '[]');
    members = JSON.parse(localStorage.getItem(KEY_MEMBERS) || '[]');
    renderMembers(); rebuildSelects(); renderWall(); renderStats();
  };
  const origSave = save;
  save = function() { origSave(); bc.postMessage('update'); };
} catch(e) {}

// ── INIT ──
renderMembers();
rebuildSelects();
renderWall();
renderStats();
</script>
</body>
</html>
